<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Access Login</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 {
            color: #1e293b;
            margin-bottom: 8px;
            font-size: 24px;
        }
        p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-size: 14px;
            font-weight: 600;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 18px;
            letter-spacing: 4px;
            text-align: center;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="password"]:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .login-btn {
            width: 100%;
            background-color: #2563eb;
            color: #ffffff;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .login-btn:hover {
            background-color: #1d4ed8;
        }
        .error-message {
            color: #dc2626;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Dashboard Access</h2>
        <p>Please enter your security PIN to log in</p>

        <form id="login-form">
            <div class="form-group">
                <label for="pin-input">Security PIN</label>
                <input type="password" id="pin-input" inputmode="numeric" pattern="[0-9]*" placeholder="••••" maxlength="6">
            </div>
            
            <button type="submit" class="login-btn">Authenticate</button>
            <div id="error-zone" class="error-message"></div>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const loginForm = document.getElementById("login-form");
            const pinInput = document.getElementById("pin-input");
            const errorZone = document.getElementById("error-zone");

            // 1. Listen for form submit
            loginForm.addEventListener("submit", function(e) {
                e.preventDefault();
                
                errorZone.style.display = "none";
                const pinVal = pinInput.value.trim();

                if (!pinVal) {
                    errorZone.textContent = "PIN field cannot be left blank.";
                    errorZone.style.display = "block";
                    return;
                }

                // 2. Send the PIN to POST http://localhost:5002/api/login
                fetch("http://localhost:5002/api/login", { // <-- FIXED: Removed /auth from the path
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ pin: pinVal })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Invalid security PIN combination.");
                    }
                    return response.json();
                })
                .then(data => {
                    // 3. On success, store the token in localStorage
                    localStorage.setItem("authToken", data.token);
                    
                    // 4. Redirect to dashboard.html
                    window.location.href = "dashboard.html";
                })
                .catch(err => {
                    console.error("Login Authentication Failure:", err);
                    
                    // 5. On failure, show the error message in error-zone
                    errorZone.textContent = err.message || "An error occurred. Verify backend states.";
                    errorZone.style.display = "block";
                    
                    pinInput.value = ""; // Clear input field
                    pinInput.focus();
                });
            });
        });
</script>
</body>
</html>
