<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Scanner</title>
    <style>
        /* ==========================================================================
   1. Core Reset & Global Styles
   ========================================================================== */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #f4f6f9;
    color: #333333;
    line-height: 1.6;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ==========================================================================
   2. Main Layout Containers
   ========================================================================== */
body > h2,
#reader,
#visitor-details {
    width: 100%;
    max-width: 520px;
    background: #ffffff;
    padding: 0 30px;
}

body > h2 {
    padding-top: 35px;
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
    color: #1a1a1a;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
}

/* Decorative modern separator matching the registration form */
hr {
    border: none;
    border-top: 1px solid #e2e8f0;
    width: 100%;
    max-width: 520px;
    background-color: #ffffff;
}

/* ==========================================================================
   3. Camera / Scanner Container Styling
   ========================================================================== */
#reader {
    padding-top: 20px;
    padding-bottom: 25px;
}

/* Overriding and polishing internal HTML5-QRCode library styling */
#reader table {
    margin: 0 auto !important;
}

#reader img {
    max-width: 100px;
    opacity: 0.6;
}

/* Style the library's built-in actions (e.g., request camera permission button) */
#reader button, 
#reader_dashboard button {
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    color: #ffffff;
    background-color: #2563eb;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background-color 0.15s ease;
}

#reader button:hover,
#reader_dashboard button:hover {
    background-color: #1d4ed8;
}

/* The scanning target box accent styling overrides */
#reader__scan_region video {
    border-radius: 6px;
    background: #000000;
}

/* ==========================================================================
   4. Visitor Details / Results Presentation
   ========================================================================== */
#visitor-details {
    padding-top: 25px;
    padding-bottom: 35px;
    border-bottom-left-radius: 8px;
    border-bottom-right-radius: 8px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
}

#visitor-details h3 {
    font-size: 16px;
    font-weight: 600;
    color: #718096;
    margin-bottom: 15px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* Initial scan instructions placeholder font */
#visitor-details p {
    color: #4a5568;
    font-size: 15px;
}

/* Container for data appended by scan.js after API validation */
#visitor-details div {
    background-color: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    padding: 16px;
    margin-top: 10px;
}

#visitor-details div p {
    margin-bottom: 8px;
    font-size: 14px;
    color: #334155;
    display: flex;
    justify-content: space-between;
    border-bottom: 1px dashed #e2e8f0;
    padding-bottom: 8px;
}

#visitor-details div p:last-child {
    margin-bottom: 0;
    border-bottom: none;
    padding-bottom: 0;
}

#visitor-details div p strong {
    color: #64748b;
    font-weight: 500;
}
    </style>
</head>
<body>

    <h2>QR Code Scanner</h2>

    <div id="reader"></div>

    <hr>

    <div id="visitor-details">
        <h3>Visitor Details</h3>
        <p>Scan a QR code to view registration information.</p>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <script src="scan.js"></script>

</body>
</html>
